<style>
  .pkf-passport-section {
    background: #F7F8F5;
    padding: 56px 0 64px;
    color: #111517;
    font-family: Manrope, "TildaSans", Arial, sans-serif;
  }

  .pkf-passport-card {
    width: 1120px;
    max-width: calc(100% - 64px);
    margin: 0 auto;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 270px minmax(0, 1fr);
    gap: 46px;
    padding: 42px 44px;
    background: #FFFFFF;
    border: 1px solid #E3E7EA;
    border-radius: 8px;
  }

  .pkf-passport-label {
    margin: 0 0 14px;
    color: #B88900;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 2.4px;
    line-height: 1.2;
    text-transform: uppercase;
  }

  .pkf-passport-title {
    margin: 0 0 14px;
    color: #111517;
    font-size: 34px;
    font-weight: 900;
    line-height: 1.08;
  }

  .pkf-passport-description {
    max-width: 230px;
    margin: 0;
    color: #5F6B73;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.5;
  }

  .pkf-passport-content {
    min-width: 0;
  }

  .pkf-passport-specs {
    width: 100%;
    border-top: 1px solid #E3E7EA;
  }

  .pkf-passport-group {
    margin-top: 18px;
    color: #B88900;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1.4px;
    line-height: 1.25;
    text-transform: uppercase;
  }

  .pkf-passport-group:first-child {
    margin-top: 0;
    padding-top: 0;
  }

  .pkf-passport-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(210px, 0.58fr);
    gap: 28px;
    min-height: 44px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #E3E7EA;
  }

  .pkf-passport-name {
    color: #111517;
    font-size: 15px;
    font-weight: 800;
    line-height: 1.35;
  }

  .pkf-passport-value {
    color: #7A858C;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.35;
  }

  .pkf-passport-empty {
    padding: 14px 0 0;
    color: #7A858C;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.45;
  }

  .pkf-passport-toggle {
    display: inline-flex;
    margin-top: 18px;
    margin-left: auto;
    background: transparent;
    border: none;
    padding: 0;
    color: #111517;
    font-family: Manrope, "TildaSans", Arial, sans-serif;
    font-size: 14px;
    font-weight: 900;
    line-height: 1.35;
    text-decoration: none;
    cursor: pointer;
  }

  .pkf-passport-toggle:hover {
    color: #B88900;
  }

  @media (max-width: 1199px) {
    .pkf-passport-card {
      width: 880px;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 36px;
    }
  }

  @media (max-width: 959px) {
    .pkf-passport-card {
      width: 576px;
      display: block;
    }

    .pkf-passport-intro {
      margin-bottom: 30px;
    }

    .pkf-passport-description {
      max-width: none;
    }
  }

  @media (max-width: 639px) {
    .pkf-passport-card {
      width: calc(100% - 48px);
      max-width: none;
      padding: 30px 28px;
    }

    .pkf-passport-title {
      font-size: 30px;
    }

    .pkf-passport-row {
      grid-template-columns: minmax(0, 1fr) minmax(150px, 0.7fr);
      gap: 20px;
    }
  }

  @media (max-width: 479px) {
    .pkf-passport-card {
      width: calc(100% - 32px);
      padding: 26px 22px;
    }

    .pkf-passport-title {
      font-size: 27px;
    }

    .pkf-passport-row {
      display: block;
      min-height: 0;
      padding: 12px 0;
    }

    .pkf-passport-value {
      margin-top: 6px;
    }
  }
</style>

<section class="pkf-passport-section">
  <div class="pkf-passport-card">
    <div class="pkf-passport-intro">
      <div class="pkf-passport-label">Технические данные</div>
      <h2 class="pkf-passport-title">Технический паспорт</h2>
      <p class="pkf-passport-description">Основные параметры выбранного изделия.</p>
    </div>

    <div class="pkf-passport-content">
      <div id="productPassportSpecs" class="pkf-passport-specs"></div>
      <button id="productPassportToggle" class="pkf-passport-toggle" type="button" style="display:none;">
        Показать все характеристики ↓
      </button>
    </div>
  </div>
</section>

<script>
  (function () {
    var specsEl = document.getElementById('productPassportSpecs');
    var toggleEl = document.getElementById('productPassportToggle');
    var allRows = [];
    var expanded = false;
    var visibleLimit = 10;

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getSortValue(item) {
      var sort = Number(item && item.sort);
      return Number.isFinite(sort) ? sort : 0;
    }

    function getGroupName(item) {
      var group = item && typeof item.group === 'string' ? item.group.trim() : '';
      return group || 'Характеристики';
    }

    function renderRows() {
      if (!specsEl) {
        return;
      }

      if (allRows.length === 0) {
        specsEl.className = 'pkf-passport-empty';
        specsEl.innerHTML = 'Характеристики уточняются по запросу.';
        if (toggleEl) {
          toggleEl.style.display = 'none';
        }
        return;
      }

      var rowsToShow = expanded || allRows.length <= visibleLimit ? allRows : allRows.slice(0, visibleLimit);
      var html = [];
      var currentGroup = null;

      specsEl.className = 'pkf-passport-specs';

      rowsToShow.forEach(function (item) {
        var group = getGroupName(item);
        var value = item.value || '';
        var unit = item.unit ? ' ' + item.unit : '';

        if (group !== currentGroup) {
          html.push('<div class="pkf-passport-group">' + escapeHtml(group) + '</div>');
          currentGroup = group;
        }

        html.push([
          '<div class="pkf-passport-row">',
          '<div class="pkf-passport-name">',
          escapeHtml(item.name),
          '</div>',
          '<div class="pkf-passport-value">',
          escapeHtml(value + unit),
          '</div>',
          '</div>'
        ].join(''));
      });

      specsEl.innerHTML = html.join('');

      if (toggleEl) {
        if (allRows.length > visibleLimit) {
          toggleEl.style.display = 'inline-flex';
          toggleEl.textContent = expanded ? 'Скрыть характеристики ↑' : 'Показать все характеристики ↓';
        } else {
          toggleEl.style.display = 'none';
        }
      }
    }

    function renderPassport(context) {
      var product = context && context.product ? context.product : {};
      var data = context && context.data ? context.data : {};
      var characteristics = Array.isArray(data.characteristics) ? data.characteristics : [];

      if (!product.slug) {
        return;
      }

      allRows = characteristics
        .filter(function (item) {
          return item && item.product_slug === product.slug;
        })
        .sort(function (a, b) {
          return getSortValue(a) - getSortValue(b);
        });

      expanded = false;
      renderRows();
    }

    if (toggleEl) {
      toggleEl.addEventListener('click', function () {
        expanded = !expanded;
        renderRows();
      });
    }

    document.addEventListener('pkfProductLoaded', function (event) {
      renderPassport(event.detail);
    });

    if (window.pkfProductContext) {
      renderPassport(window.pkfProductContext);
    }
  })();
</script>
