<script>
  (function () {
    var DATA_URL = 'https://irozis.github.io/pkftechno-data/data/products.json';
    var AUTOPLAY_INTERVAL_MS = 10000;
    var REQUEST_CTA_TEXT = 'Оставить заявку';
    var PLACEHOLDER = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640">' +
      '<rect width="960" height="640" fill="#F7F8F5"/>' +
      '<rect x="220" y="140" width="520" height="360" rx="8" fill="#FFFFFF" stroke="#D9DEE2" stroke-width="2"/>' +
      '<path d="M335 408h290M365 242h230M365 292h230M365 342h230" stroke="#B7C0C7" stroke-width="18" stroke-linecap="round"/>' +
      '<circle cx="650" cy="232" r="34" fill="#FFC400"/>' +
      '<text x="480" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#5F6B73">Изображение уточняется</text>' +
      '</svg>'
    );

    function getSlug() {
      return new URLSearchParams(window.location.search).get('slug');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getSortValue(item) {
      var sort = Number(item && item.sort);
      return Number.isFinite(sort) ? sort : 0;
    }

    function findAtom(element) {
      return element && element.querySelector ? element.querySelector('.tn-atom') || element : element;
    }

    function setText(selector, value) {
      document.querySelectorAll('.' + selector).forEach(function (element) {
        findAtom(element).textContent = value || '';
      });
    }

    function setLink(selector, href) {
      document.querySelectorAll('.' + selector).forEach(function (element) {
        var link = element.matches && element.matches('a') ? element : element.querySelector('a');
        if (link) {
          link.setAttribute('href', href);
        }
      });
    }

    function setImage(selector, imageUrl, alt) {
      document.querySelectorAll('.' + selector).forEach(function (element) {
        var target = element.matches && element.matches('img') ? element : element.querySelector('img');
        if (target) {
          target.setAttribute('src', imageUrl);
          target.setAttribute('data-original', imageUrl);
          target.setAttribute('alt', alt || '');
          return;
        }

        var atom = findAtom(element);
        if (atom && atom.style) {
          atom.style.backgroundImage = 'url("' + imageUrl.replace(/"/g, '%22') + '")';
          atom.style.backgroundSize = 'contain';
          atom.style.backgroundRepeat = 'no-repeat';
          atom.style.backgroundPosition = 'center center';
          atom.setAttribute('role', 'img');
          atom.setAttribute('aria-label', alt || '');
        }
      });
    }

    function bindImageLightbox(selector, images, startIndex) {
      document.querySelectorAll('.' + selector).forEach(function (element) {
        var target = element.matches && element.matches('img') ? element : element.querySelector('img');
        var clickable = target || findAtom(element);

        if (!clickable || !clickable.setAttribute) {
          return;
        }

        clickable.pkfLightboxImages = images;
        clickable.pkfLightboxIndex = startIndex || 0;
        clickable.style.cursor = 'zoom-in';

        if (!clickable.hasAttribute('tabindex')) {
          clickable.setAttribute('tabindex', '0');
        }

        if (!clickable.hasAttribute('aria-label')) {
          clickable.setAttribute('aria-label', 'Open product image');
        }

        if (clickable.dataset.pkfLightboxBound === 'true') {
          return;
        }

        clickable.dataset.pkfLightboxBound = 'true';
        clickable.addEventListener('click', function () {
          openLightbox(clickable.pkfLightboxImages || [], clickable.pkfLightboxIndex || 0);
        });
        clickable.addEventListener('keydown', function (event) {
          if (event.key !== 'Enter' && event.key !== ' ') {
            return;
          }

          event.preventDefault();
          openLightbox(clickable.pkfLightboxImages || [], clickable.pkfLightboxIndex || 0);
        });
      });
    }

    function resolveImages(product, data) {
      var rows = Array.isArray(data.images) ? data.images : [];
      var images = rows
        .filter(function (item) {
          return item && item.product_slug === product.slug && item.image_url;
        })
        .sort(function (a, b) {
          return getSortValue(a) - getSortValue(b);
        });

      if (images.length === 0 && product.image_url) {
        images = [{
          product_slug: product.slug,
          image_url: product.image_url,
          alt: product.title,
          sort: 10
        }];
      }

      if (images.length === 0) {
        images = [{
          product_slug: product.slug,
          image_url: PLACEHOLDER,
          alt: product.title || 'Изображение товара',
          sort: 10
        }];
      }

      return images;
    }

    function getProductDescription(product) {
      if (!product) {
        return '';
      }

      return product.short_description || product.hero_description || product.description || '';
    }

    function getContext() {
      return window.pkfProductContext || null;
    }

    var lightbox = {
      root: null,
      image: null,
      counter: null,
      prev: null,
      next: null,
      images: [],
      index: 0,
      resumeAutoplay: null,
      onChange: null
    };

    function ensureLightbox() {
      if (lightbox.root) {
        return lightbox.root;
      }

      var root = document.createElement('div');
      root.className = 'pkf-product-lightbox';
      root.setAttribute('role', 'dialog');
      root.setAttribute('aria-modal', 'true');
      root.innerHTML = [
        '<div class="pkf-product-lightbox__backdrop"></div>',
        '<div class="pkf-product-lightbox__dialog" role="dialog" aria-modal="true" aria-label="Product image preview">',
        '<button class="pkf-product-lightbox__close" type="button" aria-label="Р—Р°РєСЂС‹С‚СЊ">×</button>',
        '<button class="pkf-product-lightbox__arrow pkf-product-lightbox__arrow--prev" type="button" aria-label="РџСЂРµРґС‹РґСѓС‰РµРµ РёР·РѕР±СЂР°Р¶РµРЅРёРµ">←</button>',
        '<img class="pkf-product-lightbox__image" src="" alt="">',
        '<button class="pkf-product-lightbox__arrow pkf-product-lightbox__arrow--next" type="button" aria-label="РЎР»РµРґСѓСЋС‰РµРµ РёР·РѕР±СЂР°Р¶РµРЅРёРµ">→</button>',
        '<div class="pkf-product-lightbox__counter">1 / 1</div>',
        '</div>'
      ].join('');
      document.body.appendChild(root);

      lightbox.root = root;
      lightbox.image = root.querySelector('.pkf-product-lightbox__image');
      lightbox.counter = root.querySelector('.pkf-product-lightbox__counter');
      lightbox.prev = root.querySelector('.pkf-product-lightbox__arrow--prev');
      lightbox.next = root.querySelector('.pkf-product-lightbox__arrow--next');

      root.querySelector('.pkf-product-lightbox__close').addEventListener('click', closeLightbox);
      root.querySelector('.pkf-product-lightbox__backdrop').addEventListener('click', closeLightbox);
      lightbox.prev.addEventListener('click', function () {
        shiftLightbox(-1);
      });
      lightbox.next.addEventListener('click', function () {
        shiftLightbox(1);
      });
      document.addEventListener('keydown', function (event) {
        if (!lightbox.root || !lightbox.root.classList.contains('is-open')) {
          return;
        }

        if (event.key === 'Escape') {
          closeLightbox();
        } else if (event.key === 'ArrowLeft') {
          shiftLightbox(-1);
        } else if (event.key === 'ArrowRight') {
          shiftLightbox(1);
        }
      });

      return root;
    }

    function renderLightbox() {
      if (!lightbox.image || lightbox.images.length === 0) {
        return;
      }

      var image = lightbox.images[lightbox.index];
      lightbox.image.setAttribute('src', image.image_url);
      lightbox.image.setAttribute('alt', image.alt || '');
      lightbox.root.classList.toggle('is-single', lightbox.images.length < 2);

      if (lightbox.counter) {
        lightbox.counter.textContent = (lightbox.index + 1) + ' / ' + lightbox.images.length;
      }

      if (typeof lightbox.onChange === 'function') {
        lightbox.onChange(lightbox.index);
      }
    }

    function openLightbox(images, index, pauseAutoplay, resumeAutoplay, onChange) {
      if (!Array.isArray(images) || images.length === 0) {
        return;
      }

      if (typeof pauseAutoplay === 'function') {
        pauseAutoplay();
      }

      ensureLightbox();
      lightbox.images = images;
      lightbox.index = (index + images.length) % images.length;
      lightbox.resumeAutoplay = typeof resumeAutoplay === 'function' ? resumeAutoplay : null;
      lightbox.onChange = typeof onChange === 'function' ? onChange : null;
      renderLightbox();
      lightbox.root.classList.add('is-open');
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      if (!lightbox.root || !lightbox.root.classList.contains('is-open')) {
        return;
      }

      lightbox.root.classList.remove('is-open');
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';

      var resumeAutoplay = lightbox.resumeAutoplay;
      lightbox.resumeAutoplay = null;
      lightbox.onChange = null;
      if (typeof resumeAutoplay === 'function') {
        resumeAutoplay();
      }
    }

    function shiftLightbox(step) {
      if (lightbox.images.length < 2) {
        return;
      }

      lightbox.index = (lightbox.index + step + lightbox.images.length) % lightbox.images.length;
      renderLightbox();
    }

    var requestModal = {
      root: null,
      form: null,
      title: null,
      description: null,
      meta: null,
      success: null,
      lastFocus: null,
      context: null
    };

    function ensureRequestModal() {
      if (requestModal.root) {
        return requestModal.root;
      }

      var root = document.createElement('div');
      root.className = 'pkf-product-request-modal';
      root.setAttribute('role', 'dialog');
      root.setAttribute('aria-modal', 'true');
      root.setAttribute('aria-labelledby', 'pkf-product-request-title');
      root.innerHTML = [
        '<div class="pkf-product-request-modal__backdrop"></div>',
        '<div class="pkf-product-request-modal__dialog">',
        '<button class="pkf-product-request-modal__close" type="button" aria-label="Закрыть">×</button>',
        '<div class="pkf-product-request-modal__content">',
        '<p class="pkf-product-request-modal__eyebrow">Заявка</p>',
        '<h2 id="pkf-product-request-title">Заявка на приобретение</h2>',
        '<p class="pkf-product-request-modal__intro">Заполните форму — специалист уточнит исполнение, комплектацию и условия эксплуатации изделия.</p>',
        '<div class="pkf-product-request-modal__product">',
        '<p class="pkf-product-request-modal__product-title"></p>',
        '<p class="pkf-product-request-modal__product-description"></p>',
        '<div class="pkf-product-request-modal__product-meta"></div>',
        '</div>',
        '<form class="pkf-product-request-form t-form js-form-proccess" action="https://forms.tildacdn.com/procces/" method="POST" data-formactiontype="2" data-success-callback="pkfProductRequestSuccess">',
        '<div class="pkf-product-request-form__row">',
        '<label>Имя*<input class="t-input" type="text" name="Name" autocomplete="name" required></label>',
        '<label>Название компании<input class="t-input" type="text" name="Company" autocomplete="organization"></label>',
        '</div>',
        '<div class="pkf-product-request-form__row">',
        '<label>Телефон<input class="t-input" type="tel" name="Phone" autocomplete="tel"></label>',
        '<label>Почта*<input class="t-input" type="email" name="Email" autocomplete="email" required></label>',
        '</div>',
        '<label>Комментарий<textarea class="t-input" name="Comment" rows="4"></textarea></label>',
        '<label class="pkf-product-request-form__agreement"><input type="checkbox" name="personal_data_agreement" value="yes" required><span>Я согласен на обработку персональных данных</span></label>',
        '<input type="hidden" name="product_title">',
        '<input type="hidden" name="product_slug">',
        '<input type="hidden" name="product_url">',
        '<input type="hidden" name="product_description">',
        '<button class="pkf-product-request-form__submit t-submit" type="submit">Отправить заявку</button>',
        '<div class="pkf-product-request-form__success">Спасибо! Заявка отправлена.</div>',
        '</form>',
        '</div>',
        '</div>'
      ].join('');
      document.body.appendChild(root);

      requestModal.root = root;
      requestModal.form = root.querySelector('.pkf-product-request-form');
      requestModal.title = root.querySelector('.pkf-product-request-modal__product-title');
      requestModal.description = root.querySelector('.pkf-product-request-modal__product-description');
      requestModal.meta = root.querySelector('.pkf-product-request-modal__product-meta');
      requestModal.success = root.querySelector('.pkf-product-request-form__success');

      root.querySelector('.pkf-product-request-modal__close').addEventListener('click', closeRequestModal);
      root.querySelector('.pkf-product-request-modal__backdrop').addEventListener('click', closeRequestModal);
      requestModal.form.addEventListener('submit', function () {
        updateRequestForm(requestModal.context || getContext());
      });

      document.addEventListener('keydown', function (event) {
        if (!requestModal.root || !requestModal.root.classList.contains('is-open')) {
          return;
        }

        if (event.key === 'Escape') {
          closeRequestModal();
        }
      });

      window.pkfProductRequestSuccess = function () {
        if (requestModal.success) {
          requestModal.success.classList.add('is-visible');
        }
      };

      return root;
    }

    function updateRequestForm(context) {
      ensureRequestModal();

      if (!context || !context.product) {
        return false;
      }

      var product = context.product;
      var description = getProductDescription(product);
      var meta = [product.series, product.type].filter(Boolean);

      requestModal.context = context;
      requestModal.title.textContent = product.title || '';
      requestModal.description.textContent = description || '';
      requestModal.description.style.display = description ? '' : 'none';
      requestModal.meta.innerHTML = meta.map(function (item) {
        return '<span>' + escapeHtml(item) + '</span>';
      }).join('');
      requestModal.meta.style.display = meta.length > 0 ? '' : 'none';

      setRequestField('product_title', product.title || '');
      setRequestField('product_slug', product.slug || '');
      setRequestField('product_url', window.location.href);
      setRequestField('product_description', description || '');
      return true;
    }

    function setRequestField(name, value) {
      if (!requestModal.form) {
        return;
      }

      var field = requestModal.form.querySelector('[name="' + name + '"]');
      if (field) {
        field.value = value || '';
      }
    }

    function openRequestModal(context) {
      ensureRequestModal();
      requestModal.lastFocus = document.activeElement;
      updateRequestForm(context || getContext());

      if (requestModal.success) {
        requestModal.success.classList.remove('is-visible');
      }

      requestModal.root.classList.add('is-open');
      document.documentElement.style.overflow = 'hidden';

      var firstField = requestModal.form && requestModal.form.querySelector('input:not([type="hidden"]), textarea, button');
      if (firstField) {
        firstField.focus();
      }
    }

    function closeRequestModal() {
      if (!requestModal.root || !requestModal.root.classList.contains('is-open')) {
        return;
      }

      requestModal.root.classList.remove('is-open');
      document.documentElement.style.overflow = '';

      if (requestModal.lastFocus && typeof requestModal.lastFocus.focus === 'function') {
        requestModal.lastFocus.focus();
      }
      requestModal.lastFocus = null;
    }

    function isRequestCta(element) {
      if (!element || !element.closest) {
        return false;
      }

      var candidate = element.closest('a, button, [role="button"]');
      if (!candidate) {
        return false;
      }

      var href = candidate.getAttribute && candidate.getAttribute('href');
      var text = (candidate.textContent || '').replace(/\s+/g, ' ').trim();
      return href === '#request' || text === REQUEST_CTA_TEXT;
    }

    function initRequestModal() {
      document.addEventListener('click', function (event) {
        if (!isRequestCta(event.target)) {
          return;
        }

        var submitButton = event.target.closest && event.target.closest('.pkf-product-request-form__submit');
        if (submitButton) {
          return;
        }

        event.preventDefault();
        var context = getContext();
        if (context && context.product) {
          openRequestModal(context);
          return;
        }

        ensureRequestModal();
        document.addEventListener('pkfProductLoaded', function onProductLoaded(loadedEvent) {
          document.removeEventListener('pkfProductLoaded', onProductLoaded);
          openRequestModal(loadedEvent.detail);
        });
      });

      document.addEventListener('pkfProductLoaded', function (event) {
        updateRequestForm(event.detail);
      });

      if (getContext()) {
        updateRequestForm(getContext());
      }
    }

    function renderGallery(images) {
      var galleryElements = document.querySelectorAll('.js-product-gallery');

      if (galleryElements.length === 0) {
        return false;
      }

      galleryElements.forEach(function (element) {
        var currentIndex = 0;
        var hasMultipleImages = images.length > 1;

        element.innerHTML = [
          '<section class="pkf-product-slider' + (hasMultipleImages ? '' : ' is-single') + '" aria-label="Галерея товара">',
          '<div class="pkf-product-slider__viewport">',
          '<img class="pkf-product-slider__image" src="' + escapeHtml(images[0].image_url) + '" alt="' + escapeHtml(images[0].alt || '') + '">',
          '</div>',
          '<div class="pkf-product-slider__footer">',
          '<div class="pkf-product-slider__dots"></div>',
          '<div class="pkf-product-slider__counter">1 / ' + images.length + '</div>',
          '</div>',
          '</section>'
        ].join('');

        var slider = element.querySelector('.pkf-product-slider');
        var imageEl = element.querySelector('.pkf-product-slider__image');
        var dotsEl = element.querySelector('.pkf-product-slider__dots');
        var counterEl = element.querySelector('.pkf-product-slider__counter');
        var autoplayTimer = null;
        var isHovering = false;

        if (imageEl) {
          imageEl.addEventListener('click', function () {
            openLightbox(images, currentIndex, stopAutoplay, resumeAutoplayAfterLightbox, update);
          });
        }

        function renderDots() {
          if (!dotsEl) {
            return;
          }

          dotsEl.innerHTML = images.map(function (_image, index) {
            return '<button class="pkf-product-slider__dot' + (index === currentIndex ? ' is-active' : '') + '" type="button" aria-label="Показать изображение ' + (index + 1) + '"></button>';
          }).join('');

          dotsEl.querySelectorAll('.pkf-product-slider__dot').forEach(function (dot, index) {
            dot.addEventListener('click', function () {
              update(index);
              restartAutoplay();
            });
          });
        }

        function update(nextIndex) {
          currentIndex = (nextIndex + images.length) % images.length;

          if (imageEl) {
            imageEl.setAttribute('src', images[currentIndex].image_url);
            imageEl.setAttribute('alt', images[currentIndex].alt || '');
          }

          if (counterEl) {
            counterEl.textContent = (currentIndex + 1) + ' / ' + images.length;
          }

          if (dotsEl) {
            dotsEl.querySelectorAll('.pkf-product-slider__dot').forEach(function (dot, index) {
              dot.classList.toggle('is-active', index === currentIndex);
            });
          }
        }

        function stopAutoplay() {
          if (!autoplayTimer) {
            return;
          }

          window.clearInterval(autoplayTimer);
          autoplayTimer = null;
        }

        function startAutoplay() {
          stopAutoplay();

          if (!hasMultipleImages || isHovering) {
            return;
          }

          autoplayTimer = window.setInterval(function () {
            update(currentIndex + 1);
          }, AUTOPLAY_INTERVAL_MS);
        }

        function restartAutoplay() {
          stopAutoplay();
          startAutoplay();
        }

        function resumeAutoplayAfterLightbox() {
          isHovering = false;
          startAutoplay();
        }

        renderDots();

        if (!hasMultipleImages && slider) {
          slider.classList.add('is-single');
          return;
        }

        if (slider) {
          slider.addEventListener('mouseenter', function () {
            isHovering = true;
            stopAutoplay();
          });

          slider.addEventListener('mouseleave', function () {
            isHovering = false;
            startAutoplay();
          });
        }

        startAutoplay();
      });

      return true;
    }

    function showMessage(message) {
      var node = document.createElement('div');
      node.className = 'pkf-product-loader-message';
      node.textContent = message;
      document.body.insertBefore(node, document.body.firstChild);
      setText('js-product-title', message);
    }

    function renderProduct(product, data) {
      var images = resolveImages(product, data);
      var mainImage = images[0];
      var characteristics = Array.isArray(data.characteristics) ? data.characteristics : [];
      var relatedProducts = Array.isArray(data.related_products) ? data.related_products : [];
      var shortText = product.hero_description || product.short_description || product.description || '';
      var backLink = product.series ? '/product-category?series=' + encodeURIComponent(product.series) : '/pss2ptest';

      setText('js-product-section', [product.section, product.series].filter(Boolean).join(' / '));
      setText('js-product-title', product.hero_title || product.title || '');
      setText('js-product-short', shortText);
      setText('js-product-meta-series', product.series || '');
      setText('js-product-meta-type', product.type || '');
      setLink('js-product-back-link', backLink);

      if (!renderGallery(images)) {
        if (document.querySelectorAll('.js-product-image').length > 0) {
          setImage('js-product-image', mainImage.image_url, mainImage.alt || product.title || '');
          bindImageLightbox('js-product-image', images, 0);
        } else {
          console.warn('PKF product loader: neither .js-product-gallery nor .js-product-image was found.');
        }
      }

      window.pkfProductContext = {
        product: product,
        data: data,
        images: images,
        characteristics: characteristics,
        relatedProducts: relatedProducts
      };

      document.dispatchEvent(new CustomEvent('pkfProductLoaded', {
        detail: window.pkfProductContext
      }));
    }

    async function init() {
      var slug = getSlug();

      if (!slug) {
        showMessage('Товар не найден');
        return;
      }

      try {
        var response = await fetch(DATA_URL, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        var data = await response.json();
        var products = Array.isArray(data.products) ? data.products : [];
        var product = products.find(function (item) {
          return item && item.slug === slug;
        });

        if (!product) {
          showMessage('Товар не найден');
          return;
        }

        renderProduct(product, data);
      } catch (error) {
        console.error('PKF product loader error:', error);
        showMessage('Товар не найден');
      }
    }

    initRequestModal();

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
