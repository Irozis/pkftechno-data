<script>
  (function () {
    var DATA_URL = 'https://irozis.github.io/pkftechno-data/data/products.json?v=20260721-hero-lightbox';
    var ASSET_BASE_URL = DATA_URL.replace(/\/data\/products\.json(?:[?#].*)?$/, '');
    var SITE_ORIGIN = 'https://pkftechno.ru';
    var SITE_NAME = 'ПКФ «Технология»';
    var PRODUCT_PATH = '/product';
    var AUTOPLAY_INTERVAL_MS = 8500;
    var IMAGE_TRANSITION_DELAY_MS = 750;
    var REQUEST_CTA_TEXT = 'Оставить заявку';
    var productDataPromise = null;
    var renderObserver = null;
    var renderRepairTimer = null;
    var guardedContext = null;
    var PLACEHOLDER = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640">' +
      '<rect width="960" height="640" fill="#F7F8F5"/>' +
      '<rect x="220" y="140" width="520" height="360" rx="8" fill="#FFFFFF" stroke="#D9DEE2" stroke-width="2"/>' +
      '<path d="M335 408h290M365 242h230M365 292h230M365 342h230" stroke="#B7C0C7" stroke-width="18" stroke-linecap="round"/>' +
      '<circle cx="650" cy="232" r="34" fill="#FFC400"/>' +
      '<text x="480" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#5F6B73">Изображение уточняется</text>' +
      '</svg>'
    );

    function getSlug() {
      return (new URLSearchParams(window.location.search).get('slug') || '').trim();
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeSeoText(value) {
      return String(value == null ? '' : value)
        .replace(/\s+/g, ' ')
        .trim();
    }

    function limitSeoText(value, maxLength) {
      var text = normalizeSeoText(value);
      if (text.length <= maxLength) {
        return text;
      }

      var shortened = text.slice(0, maxLength + 1);
      var lastSpace = shortened.lastIndexOf(' ');
      if (lastSpace > Math.floor(maxLength * 0.7)) {
        shortened = shortened.slice(0, lastSpace);
      } else {
        shortened = shortened.slice(0, maxLength);
      }

      return shortened.replace(/[\s,;:–—-]+$/, '') + '…';
    }

    function getCanonicalUrl(slug) {
      return SITE_ORIGIN + PRODUCT_PATH + '?slug=' + encodeURIComponent(slug);
    }

    function upsertMeta(selector, attributeName, attributeValue, content) {
      var node = document.head.querySelector(selector);
      if (!node) {
        node = document.createElement('meta');
        node.setAttribute(attributeName, attributeValue);
        document.head.appendChild(node);
      }
      node.setAttribute('content', content);
      return node;
    }

    function upsertNamedMeta(name, content) {
      return upsertMeta('meta[name="' + name + '"]', 'name', name, content);
    }

    function upsertPropertyMeta(property, content) {
      return upsertMeta('meta[property="' + property + '"]', 'property', property, content);
    }

    function removeMeta(selector) {
      document.head.querySelectorAll(selector).forEach(function (node) {
        node.remove();
      });
    }

    function setCanonicalUrl(url) {
      var canonicalLinks = document.head.querySelectorAll('link[rel="canonical"]');
      var canonical = canonicalLinks[0];

      if (!canonical) {
        canonical = document.createElement('link');
        canonical.setAttribute('rel', 'canonical');
        document.head.appendChild(canonical);
      }

      canonical.setAttribute('href', url);
      for (var index = 1; index < canonicalLinks.length; index += 1) {
        canonicalLinks[index].remove();
      }
    }

    function upsertJsonLd(id, value) {
      var node = document.getElementById(id);
      if (!node) {
        node = document.createElement('script');
        node.id = id;
        node.type = 'application/ld+json';
        document.head.appendChild(node);
      }
      node.textContent = JSON.stringify(value);
    }

    function removeProductJsonLd() {
      ['pkf-seo-product', 'pkf-seo-breadcrumbs'].forEach(function (id) {
        var node = document.getElementById(id);
        if (node) {
          node.remove();
        }
      });
    }

    function getSeoTitle(product) {
      var title = normalizeSeoText(product.seo_title || product.title || product.slug);
      if (product.seo_title) {
        return title;
      }
      var brandedTitle = title + ' | ' + SITE_NAME;
      return brandedTitle.length <= 75 ? brandedTitle : title;
    }

    function getSeoDescription(product) {
      var description = product.seo_description || product.description || product.hero_description || product.short_description || product.purpose || '';
      description = normalizeSeoText(description);

      if (!description) {
        description = normalizeSeoText(product.title) + ': назначение, технические характеристики и варианты исполнения. Производство ' + SITE_NAME + '.';
      }

      return limitSeoText(description, 180);
    }

    function applyProductSeo(product, images) {
      var title = getSeoTitle(product);
      var description = getSeoDescription(product);
      var canonicalUrl = getCanonicalUrl(product.slug);
      var imageUrls = (Array.isArray(images) ? images : [])
        .map(function (image) {
          return image && image.image_url;
        })
        .filter(function (imageUrl) {
          return imageUrl && imageUrl !== PLACEHOLDER && imageUrl.indexOf('data:') !== 0;
        });
      var primaryImage = imageUrls[0] || '';

      document.title = title;
      setCanonicalUrl(canonicalUrl);
      upsertNamedMeta('description', description);
      upsertNamedMeta('robots', 'index, follow, max-image-preview:large');
      upsertPropertyMeta('og:type', 'product');
      upsertPropertyMeta('og:locale', 'ru_RU');
      upsertPropertyMeta('og:site_name', SITE_NAME);
      upsertPropertyMeta('og:title', title);
      upsertPropertyMeta('og:description', description);
      upsertPropertyMeta('og:url', canonicalUrl);
      upsertNamedMeta('twitter:card', primaryImage ? 'summary_large_image' : 'summary');
      upsertNamedMeta('twitter:title', title);
      upsertNamedMeta('twitter:description', description);

      if (primaryImage) {
        upsertPropertyMeta('og:image', primaryImage);
        upsertPropertyMeta('og:image:alt', normalizeSeoText((images[0] && images[0].alt) || product.title));
        upsertNamedMeta('twitter:image', primaryImage);
      } else {
        removeMeta('meta[property="og:image"], meta[property="og:image:alt"], meta[name="twitter:image"]');
      }

      var productSchema = {
        '@context': 'https://schema.org',
        '@type': 'Product',
        name: normalizeSeoText(product.title || product.slug),
        description: description,
        url: canonicalUrl,
        sku: product.slug,
        brand: {
          '@type': 'Brand',
          name: SITE_NAME
        },
        manufacturer: {
          '@type': 'Organization',
          name: SITE_NAME,
          url: SITE_ORIGIN + '/'
        }
      };

      if (imageUrls.length > 0) {
        productSchema.image = imageUrls;
      }
      if (product.series) {
        productSchema.model = normalizeSeoText(product.series);
      }
      if (product.type) {
        productSchema.category = normalizeSeoText(product.type);
      }

      upsertJsonLd('pkf-seo-product', productSchema);
      upsertJsonLd('pkf-seo-breadcrumbs', {
        '@context': 'https://schema.org',
        '@type': 'BreadcrumbList',
        itemListElement: [
          {
            '@type': 'ListItem',
            position: 1,
            name: 'Главная',
            item: SITE_ORIGIN + '/'
          },
          {
            '@type': 'ListItem',
            position: 2,
            name: 'Продукция',
            item: SITE_ORIGIN + '/products'
          },
          {
            '@type': 'ListItem',
            position: 3,
            name: normalizeSeoText(product.title || product.slug),
            item: canonicalUrl
          }
        ]
      });
    }

    function applyNotFoundSeo() {
      var title = 'Товар не найден | ' + SITE_NAME;
      var url = SITE_ORIGIN + PRODUCT_PATH;

      document.title = title;
      setCanonicalUrl(url);
      upsertNamedMeta('description', 'Запрошенная карточка продукции не найдена. Перейдите в каталог продукции ' + SITE_NAME + '.');
      upsertNamedMeta('robots', 'noindex, follow');
      upsertPropertyMeta('og:type', 'website');
      upsertPropertyMeta('og:title', title);
      upsertPropertyMeta('og:description', 'Запрошенная карточка продукции не найдена.');
      upsertPropertyMeta('og:url', url);
      removeMeta('meta[property="og:image"], meta[property="og:image:alt"], meta[name="twitter:image"]');
      removeProductJsonLd();
    }

    function animateImageCrossfade(currentLayer, nextLayer, onComplete) {
      var duration = 1500;
      var startedAt = null;

      currentLayer.style.setProperty('transition', 'none', 'important');
      nextLayer.style.setProperty('transition', 'none', 'important');
      currentLayer.style.opacity = '1';
      nextLayer.style.opacity = '0';
      currentLayer.style.transform = 'none';
      nextLayer.style.transform = 'none';
      nextLayer.classList.add('is-active');
      nextLayer.setAttribute('aria-hidden', 'false');

      function drawFrame(timestamp) {
        if (startedAt === null) {
          startedAt = timestamp;
        }

        var progress = Math.min(1, (timestamp - startedAt) / duration);
        var eased = progress * progress * (3 - 2 * progress);
        currentLayer.style.opacity = String(1 - eased);
        nextLayer.style.opacity = String(eased);

        if (progress < 1) {
          window.requestAnimationFrame(drawFrame);
          return;
        }

        currentLayer.classList.remove('is-active');
        currentLayer.setAttribute('aria-hidden', 'true');
        currentLayer.style.opacity = '0';
        nextLayer.style.opacity = '1';

        window.requestAnimationFrame(function () {
          currentLayer.style.removeProperty('transition');
          nextLayer.style.removeProperty('transition');
          currentLayer.style.removeProperty('opacity');
          nextLayer.style.removeProperty('opacity');
          currentLayer.style.removeProperty('transform');
          nextLayer.style.removeProperty('transform');
        });

        if (typeof onComplete === 'function') {
          onComplete();
        }
      }

      window.requestAnimationFrame(drawFrame);
    }

    function getSortValue(item) {
      var sort = Number(item && item.sort);
      return Number.isFinite(sort) ? sort : 0;
    }

    function resolveAssetUrl(value) {
      if (!value || value === PLACEHOLDER || /^(?:https?:)?\/\//i.test(value) || value.indexOf('data:') === 0) {
        return value || '';
      }

      if (value.charAt(0) === '/') {
        return ASSET_BASE_URL + value;
      }

      return ASSET_BASE_URL + '/' + value.replace(/^\.?\//, '');
    }

    function normalizeProductImageUrls(data) {
      if (!data || typeof data !== 'object') {
        return data;
      }

      if (Array.isArray(data.products)) {
        data.products.forEach(function (product) {
          if (product && product.image_url) {
            product.image_url = resolveAssetUrl(product.image_url);
          }
        });
      }

      if (Array.isArray(data.images)) {
        data.images.forEach(function (image) {
          if (image && image.image_url) {
            image.image_url = resolveAssetUrl(image.image_url);
          }
        });
      }

      return data;
    }

    function findAtom(element) {
      return element && element.querySelector ? element.querySelector('.tn-atom') || element : element;
    }

    function setText(selector, value) {
      document.querySelectorAll('.' + selector).forEach(function (element) {
        findAtom(element).textContent = value || '';
      });
    }

    function setLink(selector, href) {
      document.querySelectorAll('.' + selector).forEach(function (element) {
        var link = element.matches && element.matches('a') ? element : element.querySelector('a');
        if (link) {
          link.setAttribute('href', href);
        }
      });
    }

    function setImage(selector, imageUrl, alt) {
      document.querySelectorAll('.' + selector).forEach(function (element) {
        var target = element.matches && element.matches('img') ? element : element.querySelector('img');
        if (target) {
          target.setAttribute('src', imageUrl);
          target.setAttribute('data-original', imageUrl);
          target.setAttribute('alt', alt || '');
          return;
        }

        var atom = findAtom(element);
        if (atom && atom.style) {
          atom.style.backgroundImage = 'url("' + imageUrl.replace(/"/g, '%22') + '")';
          atom.style.backgroundSize = 'contain';
          atom.style.backgroundRepeat = 'no-repeat';
          atom.style.backgroundPosition = 'center center';
          atom.setAttribute('role', 'img');
          atom.setAttribute('aria-label', alt || '');
        }
      });
    }

    function bindImageLightbox(selector, images, startIndex) {
      document.querySelectorAll('.' + selector).forEach(function (element) {
        var target = element.matches && element.matches('img') ? element : element.querySelector('img');
        var clickable = target || findAtom(element);
        var host = element.matches && element.matches('img') ? element.parentElement : element;

        if (!clickable || !clickable.setAttribute || !host) {
          return;
        }

        host.classList.add('pkf-product-image-shell');
        host.pkfLightboxImages = images;
        host.pkfLightboxIndex = startIndex || 0;
        clickable.pkfLightboxImages = images;
        clickable.pkfLightboxIndex = startIndex || 0;
        clickable.style.cursor = 'zoom-in';

        if (!clickable.hasAttribute('tabindex')) {
          clickable.setAttribute('tabindex', '0');
        }

        if (!clickable.hasAttribute('aria-label')) {
          clickable.setAttribute('aria-label', 'Open product image');
        }

        function openLegacyLightbox() {
          openLightbox(host.pkfLightboxImages || [], host.pkfLightboxIndex || 0, stopLegacyAutoplay, startLegacyAutoplay, function (index) {
            showLegacyImage(index);
          });
        }

        function stopLegacyAutoplay() {
          if (host.pkfAutoplayTimer) {
            window.clearInterval(host.pkfAutoplayTimer);
            host.pkfAutoplayTimer = null;
          }
        }

        function startLegacyAutoplay() {
          stopLegacyAutoplay();
          if (!host.pkfLightboxImages || host.pkfLightboxImages.length < 2) {
            return;
          }
          host.pkfAutoplayTimer = window.setInterval(function () {
            showLegacyImage(host.pkfLightboxIndex + 1);
          }, AUTOPLAY_INTERVAL_MS);
        }

        function showLegacyImage(nextIndex) {
          var currentImages = host.pkfLightboxImages || [];
          if (currentImages.length === 0) {
            return;
          }

          host.pkfLightboxIndex = (nextIndex + currentImages.length) % currentImages.length;
          clickable.pkfLightboxIndex = host.pkfLightboxIndex;
          var image = currentImages[host.pkfLightboxIndex];

          if (target) {
            target.classList.add('is-changing');
            window.setTimeout(function () {
              target.setAttribute('src', image.image_url);
              target.setAttribute('data-original', image.image_url);
              target.setAttribute('alt', image.alt || '');
              target.classList.remove('is-changing');
            }, IMAGE_TRANSITION_DELAY_MS);
          } else {
            clickable.style.backgroundImage = 'url("' + image.image_url.replace(/"/g, '%22') + '")';
          }

          var counter = host.querySelector('.pkf-product-image-shell__counter');
          if (counter) {
            counter.textContent = (host.pkfLightboxIndex + 1) + ' / ' + currentImages.length;
          }
        }

        if (clickable.dataset.pkfLightboxBound !== 'true') {
          clickable.dataset.pkfLightboxBound = 'true';
          clickable.addEventListener('click', openLegacyLightbox);
          clickable.addEventListener('keydown', function (event) {
            if (event.key !== 'Enter' && event.key !== ' ') {
              return;
            }

            event.preventDefault();
            openLegacyLightbox();
          });
        }

        var zoom = host.querySelector('.pkf-product-slider__zoom');
        if (!zoom) {
          zoom = document.createElement('button');
          zoom.className = 'pkf-product-slider__zoom';
          zoom.type = 'button';
          zoom.setAttribute('aria-label', 'Увеличить изображение');

          host.appendChild(zoom);
          zoom.addEventListener('click', function (event) {
            event.preventDefault();
            event.stopPropagation();
            openLegacyLightbox();
          });
        }

        host.querySelectorAll('.pkf-product-slider__arrow, .pkf-product-image-shell__counter').forEach(function (control) {
          control.remove();
        });

        if (images.length > 1) {
          var previous = document.createElement('button');
          previous.className = 'pkf-product-slider__arrow pkf-product-slider__arrow--prev';
          previous.type = 'button';
          previous.setAttribute('aria-label', 'Предыдущее изображение');
          previous.textContent = 'Назад';
          previous.addEventListener('click', function (event) {
            event.preventDefault();
            event.stopPropagation();
            showLegacyImage(host.pkfLightboxIndex - 1);
            startLegacyAutoplay();
          });

          var next = document.createElement('button');
          next.className = 'pkf-product-slider__arrow pkf-product-slider__arrow--next';
          next.type = 'button';
          next.setAttribute('aria-label', 'Следующее изображение');
          next.textContent = 'Вперёд';
          next.addEventListener('click', function (event) {
            event.preventDefault();
            event.stopPropagation();
            showLegacyImage(host.pkfLightboxIndex + 1);
            startLegacyAutoplay();
          });

          var counter = document.createElement('div');
          counter.className = 'pkf-product-image-shell__counter';
          counter.setAttribute('aria-live', 'polite');
          counter.textContent = (host.pkfLightboxIndex + 1) + ' / ' + images.length;
          host.appendChild(previous);
          host.appendChild(next);
          host.appendChild(counter);
        }

        startLegacyAutoplay();
      });
    }

    function resolveImages(product, data) {
      var rows = Array.isArray(data.images) ? data.images : [];
      var images = rows
        .filter(function (item) {
          return item && item.product_slug === product.slug && item.image_url;
        })
        .sort(function (a, b) {
          return getSortValue(a) - getSortValue(b);
        });

      if (images.length === 0 && product.image_url) {
        images = [{
          product_slug: product.slug,
          image_url: product.image_url,
          alt: product.title,
          sort: 10
        }];
      }

      if (images.length === 0) {
        images = [{
          product_slug: product.slug,
          image_url: PLACEHOLDER,
          alt: product.title || 'Изображение товара',
          sort: 10
        }];
      }

      return images;
    }

    function getProductDescription(product) {
      if (!product) {
        return '';
      }

      return product.short_description || product.hero_description || product.description || '';
    }

    function getContext() {
      return window.pkfProductContext || null;
    }

    var lightbox = {
      root: null,
      image: null,
      imageLayers: [],
      activeImageLayer: 0,
      transitionRevision: 0,
      transitionInProgress: false,
      counter: null,
      prev: null,
      next: null,
      images: [],
      index: 0,
      resumeAutoplay: null,
      onChange: null,
      pointerStartX: null,
      autoplayTimer: null
    };

    function ensureLightbox() {
      if (lightbox.root) {
        return lightbox.root;
      }

      var root = document.createElement('div');
      root.className = 'pkf-product-lightbox';
      root.setAttribute('role', 'dialog');
      root.setAttribute('aria-modal', 'true');
      root.innerHTML = [
        '<div class="pkf-product-lightbox__backdrop"></div>',
        '<div class="pkf-product-lightbox__dialog" role="dialog" aria-modal="true" aria-label="Product image preview">',
        '<div class="pkf-product-lightbox__topbar"><span class="pkf-product-lightbox__label">Просмотр изображения</span></div>',
        '<button class="pkf-product-lightbox__close" type="button" aria-label="Закрыть">×</button>',
        '<button class="pkf-product-lightbox__arrow pkf-product-lightbox__arrow--prev" type="button" aria-label="Предыдущее изображение">←</button>',
        '<div class="pkf-product-lightbox__stage">',
        '<img class="pkf-product-lightbox__image" src="" alt="" draggable="false" aria-hidden="true">',
        '<img class="pkf-product-lightbox__image" src="" alt="" draggable="false" aria-hidden="true">',
        '</div>',
        '<button class="pkf-product-lightbox__arrow pkf-product-lightbox__arrow--next" type="button" aria-label="Следующее изображение">→</button>',
        '<div class="pkf-product-lightbox__counter">1 / 1</div>',
        '<div class="pkf-product-lightbox__hint">Esc — закрыть · ← → — листать</div>',
        '</div>'
      ].join('');
      document.body.appendChild(root);

      lightbox.root = root;
      lightbox.imageLayers = Array.prototype.slice.call(root.querySelectorAll('.pkf-product-lightbox__image'));
      lightbox.image = lightbox.imageLayers[0];
      lightbox.counter = root.querySelector('.pkf-product-lightbox__counter');
      lightbox.prev = root.querySelector('.pkf-product-lightbox__arrow--prev');
      lightbox.next = root.querySelector('.pkf-product-lightbox__arrow--next');

      lightbox.imageLayers.forEach(function (layer) {
        layer.addEventListener('error', function () {
          if (layer.getAttribute('src') !== PLACEHOLDER) {
            layer.setAttribute('src', PLACEHOLDER);
          }
        });
      });

      root.querySelector('.pkf-product-lightbox__close').addEventListener('click', closeLightbox);
      root.querySelector('.pkf-product-lightbox__backdrop').addEventListener('click', closeLightbox);
      lightbox.prev.addEventListener('click', function () {
        shiftLightbox(-1);
      });
      lightbox.next.addEventListener('click', function () {
        shiftLightbox(1);
      });
      root.querySelector('.pkf-product-lightbox__dialog').addEventListener('pointerdown', function (event) {
        if (event.pointerType === 'mouse') {
          return;
        }
        lightbox.pointerStartX = event.clientX;
      });
      root.querySelector('.pkf-product-lightbox__dialog').addEventListener('pointerup', function (event) {
        if (lightbox.pointerStartX === null) {
          return;
        }
        var distance = event.clientX - lightbox.pointerStartX;
        lightbox.pointerStartX = null;
        if (Math.abs(distance) >= 55) {
          shiftLightbox(distance < 0 ? 1 : -1);
        }
      });
      root.querySelector('.pkf-product-lightbox__dialog').addEventListener('pointercancel', function () {
        lightbox.pointerStartX = null;
      });
      document.addEventListener('keydown', function (event) {
        if (!lightbox.root || !lightbox.root.classList.contains('is-open')) {
          return;
        }

        if (event.key === 'Escape') {
          closeLightbox();
        } else if (event.key === 'ArrowLeft') {
          shiftLightbox(-1);
        } else if (event.key === 'ArrowRight') {
          shiftLightbox(1);
        }
      });

      return root;
    }

    function renderLightbox() {
      if (lightbox.imageLayers.length < 2 || lightbox.images.length === 0) {
        return;
      }

      var image = lightbox.images[lightbox.index];
      var currentLayer = lightbox.imageLayers[lightbox.activeImageLayer];

      if (!currentLayer.getAttribute('src')) {
        currentLayer.setAttribute('src', image.image_url);
        currentLayer.setAttribute('alt', image.alt || '');
        currentLayer.setAttribute('aria-hidden', 'false');
        currentLayer.classList.add('is-active');
      } else if (currentLayer.getAttribute('src') !== image.image_url && !lightbox.transitionInProgress) {
        var nextLayerIndex = lightbox.activeImageLayer === 0 ? 1 : 0;
        var nextLayer = lightbox.imageLayers[nextLayerIndex];
        var revision = lightbox.transitionRevision + 1;
        lightbox.transitionRevision = revision;
        lightbox.transitionInProgress = true;
        nextLayer.classList.remove('is-active');
        nextLayer.setAttribute('aria-hidden', 'true');
        nextLayer.setAttribute('src', image.image_url);
        nextLayer.setAttribute('alt', image.alt || '');

        var revealLayer = function () {
          if (revision !== lightbox.transitionRevision) {
            lightbox.transitionInProgress = false;
            return;
          }
          animateImageCrossfade(currentLayer, nextLayer, function () {
            lightbox.activeImageLayer = nextLayerIndex;
            lightbox.image = nextLayer;
            lightbox.transitionInProgress = false;
          });
        };

        if (nextLayer.complete && nextLayer.naturalWidth > 0) {
          revealLayer();
        } else {
          nextLayer.addEventListener('load', revealLayer, { once: true });
        }
      }

      lightbox.root.classList.toggle('is-single', lightbox.images.length < 2);

      if (lightbox.counter) {
        lightbox.counter.textContent = (lightbox.index + 1) + ' / ' + lightbox.images.length;
      }

      if (typeof lightbox.onChange === 'function') {
        lightbox.onChange(lightbox.index);
      }
    }

    function preloadImages(images) {
      images.forEach(function (image) {
        if (!image || !image.image_url) {
          return;
        }
        var preload = new Image();
        preload.src = image.image_url;
        if (typeof preload.decode === 'function') {
          preload.decode().catch(function () {});
        }
      });
    }

    function openLightbox(images, index, pauseAutoplay, resumeAutoplay, onChange) {
      if (!Array.isArray(images) || images.length === 0) {
        return;
      }

      if (typeof pauseAutoplay === 'function') {
        pauseAutoplay();
      }

      ensureLightbox();
      lightbox.images = images;
      preloadImages(images);
      lightbox.index = (index + images.length) % images.length;
      lightbox.resumeAutoplay = typeof resumeAutoplay === 'function' ? resumeAutoplay : null;
      lightbox.onChange = typeof onChange === 'function' ? onChange : null;
      renderLightbox();
      lightbox.root.classList.add('is-open');
      startLightboxAutoplay();
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      if (!lightbox.root || !lightbox.root.classList.contains('is-open')) {
        return;
      }

      lightbox.root.classList.remove('is-open');
      stopLightboxAutoplay();
      lightbox.transitionRevision += 1;
      lightbox.transitionInProgress = false;
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';

      var resumeAutoplay = lightbox.resumeAutoplay;
      lightbox.resumeAutoplay = null;
      lightbox.onChange = null;
      if (typeof resumeAutoplay === 'function') {
        resumeAutoplay();
      }
    }

    function shiftLightbox(step) {
      if (lightbox.images.length < 2 || lightbox.transitionInProgress) {
        return;
      }

      lightbox.index = (lightbox.index + step + lightbox.images.length) % lightbox.images.length;
      renderLightbox();
      startLightboxAutoplay();
    }

    function stopLightboxAutoplay() {
      if (lightbox.autoplayTimer) {
        window.clearInterval(lightbox.autoplayTimer);
        lightbox.autoplayTimer = null;
      }
    }

    function startLightboxAutoplay() {
      stopLightboxAutoplay();
      if (!lightbox.root || lightbox.images.length < 2) {
        return;
      }

      lightbox.autoplayTimer = window.setInterval(function () {
        lightbox.index = (lightbox.index + 1) % lightbox.images.length;
        renderLightbox();
      }, AUTOPLAY_INTERVAL_MS);
    }

    function updateProductContext(context) {
      if (!context || !context.product) {
        return;
      }

      fillNativeTildaForms(context, getProductDescription(context.product));
    }

    function fillNativeTildaForms(context, description) {
      var product = context.product || {};
      var images = Array.isArray(context.images) ? context.images : [];
      var imageUrl = images[0] && images[0].image_url ? images[0].image_url : product.image_url || '';

      document.querySelectorAll('form').forEach(function (form) {
        var productTitleField = form.querySelector('[name="product_title"]');
        if (!productTitleField) {
          return;
        }

        form.classList.add('pkf-native-request-form');
        var productCard = form.querySelector('.pkf-native-request-product');
        if (!productCard) {
          productCard = document.createElement('div');
          productCard.className = 'pkf-native-request-product';
          productCard.innerHTML = [
            '<img class="pkf-native-request-product__image" alt="">',
            '<div><h3 class="pkf-native-request-product__title"></h3><p class="pkf-native-request-product__description"></p></div>'
          ].join('');
          var fields = form.querySelector('.t-form__inputsbox') || form.firstElementChild;
          form.insertBefore(productCard, fields || form.firstChild);
        }

        var image = productCard.querySelector('.pkf-native-request-product__image');
        var title = productCard.querySelector('.pkf-native-request-product__title');
        var summary = productCard.querySelector('.pkf-native-request-product__description');
        image.src = imageUrl;
        image.alt = product.title || '';
        image.style.display = imageUrl ? '' : 'none';
        title.textContent = product.title || '';
        summary.textContent = description || '';
        summary.style.display = description ? '' : 'none';

        [
          ['product_title', product.title || ''],
          ['product_description', description || ''],
          ['product_url', window.location.href],
          ['product_slug', product.slug || '']
        ].forEach(function (item) {
          var field = form.querySelector('[name="' + item[0] + '"]');
          if (field) {
            field.value = item[1];
          }
        });
      });
    }

    function bindRequestCta() {
      document.querySelectorAll('[data-pkf-request-cta]').forEach(function (cta) {
        var popupHref = '#popup:request';
        var nativePopupCta = document.querySelector('a[href="' + popupHref + '"]:not([data-pkf-request-cta])');
        cta.setAttribute('href', nativePopupCta ? nativePopupCta.getAttribute('href') : popupHref);

        if (cta.dataset.pkfRequestBound === 'true') {
          return;
        }

        cta.dataset.pkfRequestBound = 'true';
        cta.addEventListener('click', function (event) {
          var popupTrigger = document.querySelector('a[href="' + popupHref + '"]:not([data-pkf-request-cta])');
          if (!popupTrigger) {
            return;
          }

          event.preventDefault();
          popupTrigger.click();
        });
      });
    }

    function renderGallery(images) {
      var galleryElements = document.querySelectorAll('.js-product-gallery');

      if (galleryElements.length === 0) {
        return false;
      }

      galleryElements.forEach(function (element) {
        if (typeof element.pkfGalleryDestroy === 'function') {
          element.pkfGalleryDestroy();
        }

        var currentIndex = 0;
        var hasMultipleImages = images.length > 1;

        element.innerHTML = [
          '<section class="pkf-product-slider' + (hasMultipleImages ? '' : ' is-single') + '" aria-label="Галерея товара">',
          '<div class="pkf-product-slider__viewport" tabindex="0" aria-label="Галерея товара. Используйте стрелки для перелистывания">',
          '<button class="pkf-product-slider__arrow pkf-product-slider__arrow--prev" type="button" aria-label="Предыдущее изображение">←</button>',
          '<img class="pkf-product-slider__image is-active" src="' + escapeHtml(images[0].image_url) + '" alt="' + escapeHtml(images[0].alt || '') + '" loading="eager" decoding="async" draggable="false" aria-hidden="false">',
          '<img class="pkf-product-slider__image" src="" alt="" loading="eager" decoding="async" draggable="false" aria-hidden="true">',
          '<button class="pkf-product-slider__arrow pkf-product-slider__arrow--next" type="button" aria-label="Следующее изображение">→</button>',
          '<button class="pkf-product-slider__zoom" type="button" aria-label="Увеличить изображение">Увеличить</button>',
          '<div class="pkf-product-slider__footer">',
          '<div class="pkf-product-slider__dots"></div>',
          '<div class="pkf-product-slider__counter" aria-live="polite">1 / ' + images.length + '</div>',
          '</div>',
          '</div>',
          '</section>'
        ].join('');

        var slider = element.querySelector('.pkf-product-slider');
        var viewportEl = element.querySelector('.pkf-product-slider__viewport');
        var imageEls = Array.prototype.slice.call(element.querySelectorAll('.pkf-product-slider__image'));
        var prevEl = element.querySelector('.pkf-product-slider__arrow--prev');
        var nextEl = element.querySelector('.pkf-product-slider__arrow--next');
        var zoomEl = element.querySelector('.pkf-product-slider__zoom');
        var dotsEl = element.querySelector('.pkf-product-slider__dots');
        var counterEl = element.querySelector('.pkf-product-slider__counter');
        var activeImageLayer = 0;
        var transitionRevision = 0;
        var transitionInProgress = false;
        var pointerStartX = null;

        images.forEach(function (image) {
          if (!image || !image.image_url) {
            return;
          }
          var preload = new Image();
          preload.src = image.image_url;
          if (typeof preload.decode === 'function') {
            preload.decode().catch(function () {});
          }
        });

        imageEls.forEach(function (layer) {
          layer.addEventListener('error', function () {
            if (layer.getAttribute('src') !== PLACEHOLDER) {
              layer.setAttribute('src', PLACEHOLDER);
            }
          });
        });
        var autoplayTimer = null;

        function openCurrentImage() {
          openLightbox(images, currentIndex, stopAutoplay, resumeAutoplayAfterLightbox, update);
        }

        imageEls.forEach(function (layer) {
          layer.addEventListener('click', openCurrentImage);
        });

        if (zoomEl) {
          zoomEl.addEventListener('click', openCurrentImage);
        }

        if (prevEl) {
          prevEl.addEventListener('click', function () {
            update(currentIndex - 1);
            restartAutoplay();
          });
        }

        if (nextEl) {
          nextEl.addEventListener('click', function () {
            update(currentIndex + 1);
            restartAutoplay();
          });
        }

        if (viewportEl) {
          viewportEl.addEventListener('keydown', function (event) {
            if (event.key === 'ArrowLeft') {
              event.preventDefault();
              update(currentIndex - 1);
              restartAutoplay();
            } else if (event.key === 'ArrowRight') {
              event.preventDefault();
              update(currentIndex + 1);
              restartAutoplay();
            } else if (event.key === 'Enter') {
              event.preventDefault();
              openCurrentImage();
            }
          });

          viewportEl.addEventListener('pointerdown', function (event) {
            if (event.pointerType === 'mouse') {
              return;
            }
            pointerStartX = event.clientX;
          });

          viewportEl.addEventListener('pointerup', function (event) {
            if (pointerStartX === null) {
              return;
            }
            var distance = event.clientX - pointerStartX;
            pointerStartX = null;
            if (Math.abs(distance) < 45) {
              return;
            }
            update(currentIndex + (distance < 0 ? 1 : -1));
            restartAutoplay();
          });

          viewportEl.addEventListener('pointercancel', function () {
            pointerStartX = null;
          });
        }

        function renderDots() {
          if (!dotsEl) {
            return;
          }

          dotsEl.innerHTML = images.map(function (_image, index) {
            return '<button class="pkf-product-slider__dot' + (index === currentIndex ? ' is-active' : '') + '" type="button" aria-label="Показать изображение ' + (index + 1) + '"></button>';
          }).join('');

          dotsEl.querySelectorAll('.pkf-product-slider__dot').forEach(function (dot, index) {
            dot.addEventListener('click', function () {
              update(index);
              restartAutoplay();
            });
          });
        }

        function update(nextIndex) {
          if (transitionInProgress) {
            return;
          }

          currentIndex = (nextIndex + images.length) % images.length;

          if (imageEls.length > 1) {
            var nextImage = images[currentIndex];
            var nextLayerIndex = activeImageLayer === 0 ? 1 : 0;
            var currentLayer = imageEls[activeImageLayer];
            var nextLayer = imageEls[nextLayerIndex];
            var revision = transitionRevision + 1;
            transitionRevision = revision;
            transitionInProgress = true;

            nextLayer.classList.remove('is-active');
            nextLayer.setAttribute('aria-hidden', 'true');
            nextLayer.setAttribute('src', nextImage.image_url);
            nextLayer.setAttribute('alt', nextImage.alt || '');

            var revealLayer = function () {
              if (revision !== transitionRevision) {
                transitionInProgress = false;
                return;
              }
              animateImageCrossfade(currentLayer, nextLayer, function () {
                activeImageLayer = nextLayerIndex;
                transitionInProgress = false;
              });
            };

            if (nextLayer.complete && nextLayer.naturalWidth > 0) {
              revealLayer();
            } else {
              nextLayer.addEventListener('load', revealLayer, { once: true });
            }
          }

          if (counterEl) {
            counterEl.textContent = (currentIndex + 1) + ' / ' + images.length;
          }

          if (dotsEl) {
            dotsEl.querySelectorAll('.pkf-product-slider__dot').forEach(function (dot, index) {
              dot.classList.toggle('is-active', index === currentIndex);
            });
          }
        }

        function stopAutoplay() {
          if (!autoplayTimer) {
            return;
          }

          window.clearInterval(autoplayTimer);
          autoplayTimer = null;
        }

        function startAutoplay() {
          stopAutoplay();

          if (!hasMultipleImages) {
            return;
          }

          autoplayTimer = window.setInterval(function () {
            update(currentIndex + 1);
          }, AUTOPLAY_INTERVAL_MS);
        }

        function restartAutoplay() {
          stopAutoplay();
          startAutoplay();
        }

        function resumeAutoplayAfterLightbox() {
          startAutoplay();
        }

        element.pkfGalleryDestroy = function () {
          stopAutoplay();
          transitionRevision += 1;
          transitionInProgress = false;
        };

        renderDots();

        if (!hasMultipleImages && slider) {
          slider.classList.add('is-single');
          return;
        }

        startAutoplay();
      });

      return true;
    }

    function showMessage(message) {
      var node = document.querySelector('.pkf-product-loader-message');
      if (!node) {
        node = document.createElement('div');
        node.className = 'pkf-product-loader-message';
        document.body.insertBefore(node, document.body.firstChild);
      }
      node.textContent = message;
      setText('js-product-title', message);
    }

    function renderProduct(product, data) {
      var images = resolveImages(product, data);
      var mainImage = images[0];
      var characteristics = Array.isArray(data.characteristics) ? data.characteristics : [];
      var relatedProducts = Array.isArray(data.related_products) ? data.related_products : [];
      var shortText = product.hero_description || product.short_description || product.description || '';
      var backLink = product.series ? '/product-category?series=' + encodeURIComponent(product.series) : '/pss2ptest';

      applyProductSeo(product, images);

      setText('js-product-section', [product.section, product.series].filter(Boolean).join(' / '));
      setText('js-product-title', product.hero_title || product.title || '');
      setText('js-product-short', shortText);
      setText('js-product-meta-series', product.series ? 'Серия: ' + product.series : '');
      setText('js-product-meta-type', product.type ? 'Тип продукции: ' + product.type : '');
      setLink('js-product-back-link', backLink);

      var hasGallery = renderGallery(images);
      var hasLegacyImages = document.querySelectorAll('.js-product-image').length > 0;

      if (hasLegacyImages) {
        setImage('js-product-image', mainImage.image_url, mainImage.alt || product.title || '');
        bindImageLightbox('js-product-image', images, 0);
      }

      if (!hasGallery && !hasLegacyImages) {
        console.warn('PKF product loader: neither .js-product-gallery nor .js-product-image was found.');
      }

      window.pkfProductContext = {
        product: product,
        data: data,
        images: images,
        characteristics: characteristics,
        relatedProducts: relatedProducts
      };

      bindRequestCta();

      document.dispatchEvent(new CustomEvent('pkfProductLoaded', {
        detail: window.pkfProductContext
      }));
    }

    function productUiNeedsRepair(context) {
      if (!context || !context.product) {
        return true;
      }

      var expectedTitle = context.product.hero_title || context.product.title || '';
      var expectedShort = context.product.hero_description || context.product.short_description || context.product.description || '';
      var expectedSeries = context.product.series ? 'Серия: ' + context.product.series : '';
      var expectedType = context.product.type ? 'Тип продукции: ' + context.product.type : '';
      var title = document.querySelector('.js-product-title');
      var short = document.querySelector('.js-product-short');
      var series = document.querySelector('.js-product-meta-series');
      var type = document.querySelector('.js-product-meta-type');
      var galleries = document.querySelectorAll('.js-product-gallery');
      var legacyImages = document.querySelectorAll('.js-product-image');

      if (!title || title.textContent.trim() !== expectedTitle.trim()) {
        return true;
      }

      if (!short || short.textContent.trim() !== expectedShort.trim()) {
        return true;
      }

      if (!series || series.textContent.trim() !== expectedSeries.trim()) {
        return true;
      }

      if (!type || type.textContent.trim() !== expectedType.trim()) {
        return true;
      }

      if (galleries.length === 0 && legacyImages.length === 0) {
        return true;
      }

      for (var index = 0; index < galleries.length; index += 1) {
        if (!galleries[index].querySelector('.pkf-product-slider') || !galleries[index].querySelector('.pkf-product-slider__zoom')) {
          return true;
        }
      }

      for (var legacyIndex = 0; legacyIndex < legacyImages.length; legacyIndex += 1) {
        var legacyHost = legacyImages[legacyIndex].matches('img') ? legacyImages[legacyIndex].parentElement : legacyImages[legacyIndex];
        if (!legacyHost || !legacyHost.querySelector('.pkf-product-slider__zoom')) {
          return true;
        }
      }

      return false;
    }

    function repairProductUi() {
      window.clearTimeout(renderRepairTimer);
      renderRepairTimer = null;
      if (guardedContext && productUiNeedsRepair(guardedContext)) {
        renderProduct(guardedContext.product, guardedContext.data);
      }
    }

    function scheduleProductUiRepair() {
      window.clearTimeout(renderRepairTimer);
      renderRepairTimer = window.setTimeout(repairProductUi, 80);
    }

    function startRenderGuard(context) {
      guardedContext = context;
      if (!renderObserver && document.documentElement) {
        renderObserver = new MutationObserver(scheduleProductUiRepair);
        renderObserver.observe(document.documentElement, { childList: true, subtree: true });
      }
      scheduleProductUiRepair();
    }

    function loadProductData() {
      if (!productDataPromise) {
        productDataPromise = fetch(DATA_URL, { cache: 'no-store' }).then(function (response) {
          if (!response.ok) {
            throw new Error('HTTP ' + response.status);
          }
          return response.json();
        }).then(normalizeProductImageUrls).catch(function (error) {
          productDataPromise = null;
          throw error;
        });
      }

      return productDataPromise;
    }

    async function init() {
      var slug = getSlug();

      if (!slug) {
        applyNotFoundSeo();
        showMessage('Товар не найден');
        return;
      }

      try {
        var data = await loadProductData();
        var products = Array.isArray(data.products) ? data.products : [];
        var product = products.find(function (item) {
          return item && item.slug === slug;
        });

        if (!product) {
          applyNotFoundSeo();
          showMessage('Товар не найден');
          return;
        }

        var context = {
          product: product,
          data: data,
          images: resolveImages(product, data),
          characteristics: Array.isArray(data.characteristics) ? data.characteristics : [],
          relatedProducts: Array.isArray(data.related_products) ? data.related_products : []
        };
        applyProductSeo(product, context.images);
        startRenderGuard(context);
        if (productUiNeedsRepair(context)) {
          renderProduct(product, data);
        }
      } catch (error) {
        console.error('PKF product loader error:', error);
        applyNotFoundSeo();
        showMessage('Товар не найден');
      }
    }

    document.addEventListener('pkfProductLoaded', function (event) {
      updateProductContext(event.detail);
    });

    if (window.pkfProductContext) {
      updateProductContext(window.pkfProductContext);
    }

    init();
    document.addEventListener('DOMContentLoaded', init, { once: true });
    window.addEventListener('load', init, { once: true });
    window.setTimeout(init, 1000);
  })();
</script>
