<script>
(function(){
  var root=null, image=null, counter=null, images=[], index=0;
  function getImages(clicked){
    var context=window.pkfProductContext||{};
    var source=Array.isArray(context.images)?context.images:[];
    if(source.length) return source.filter(function(item){return item&&item.image_url;});
    return clicked&&clicked.src?[{image_url:clicked.currentSrc||clicked.src,alt:clicked.alt||''}]:[];
  }
  function render(){
    if(!image||!images.length)return;
    image.src=images[index].image_url; image.alt=images[index].alt||'';
    if(counter)counter.textContent=(index+1)+' / '+images.length;
    root.classList.toggle('is-single',images.length<2);
  }
  function close(){if(!root)return;root.classList.remove('is-open');document.documentElement.style.overflow='';document.body.style.overflow='';}
  function open(clicked){
    images=getImages(clicked); if(!images.length)return;
    if(!root){
      root=document.createElement('div'); root.className='pkf-hero-lightbox'; root.setAttribute('role','dialog'); root.setAttribute('aria-modal','true');
      root.innerHTML='<div class="pkf-hero-lightbox__backdrop"></div><div class="pkf-hero-lightbox__dialog"><button class="pkf-hero-lightbox__close" type="button" aria-label="Закрыть">&#10005;</button><button class="pkf-hero-lightbox__arrow pkf-hero-lightbox__arrow--prev" type="button" aria-label="Предыдущее изображение">&#8592;</button><img class="pkf-hero-lightbox__image" alt=""><button class="pkf-hero-lightbox__arrow pkf-hero-lightbox__arrow--next" type="button" aria-label="Следующее изображение">&#8594;</button><div class="pkf-hero-lightbox__counter"></div></div>';
      document.body.appendChild(root); image=root.querySelector('.pkf-hero-lightbox__image'); counter=root.querySelector('.pkf-hero-lightbox__counter');
      root.querySelector('.pkf-hero-lightbox__close').onclick=close; root.querySelector('.pkf-hero-lightbox__backdrop').onclick=close;
      root.querySelector('.pkf-hero-lightbox__arrow--prev').onclick=function(){index=(index-1+images.length)%images.length;render();}; root.querySelector('.pkf-hero-lightbox__arrow--next').onclick=function(){index=(index+1)%images.length;render();};
      document.addEventListener('keydown',function(e){if(!root||!root.classList.contains('is-open'))return;if(e.key==='Escape')close();if(e.key==='ArrowLeft'){index=(index-1+images.length)%images.length;render();}if(e.key==='ArrowRight'){index=(index+1)%images.length;render();}});
    }
    index=0; render(); root.classList.add('is-open'); document.documentElement.style.overflow='hidden'; document.body.style.overflow='hidden';
  }
  document.addEventListener('click',function(e){var target=e.target&&e.target.closest?e.target.closest('.pkf-product-hero .pkf-product-slider__image'):null;if(!target)return;window.setTimeout(function(){if(!document.querySelector('.pkf-product-lightbox.is-open'))open(target);},0);});
